      animation:ringPulse1 3.5s ease-in-out infinite; }
    .ring-2 { width:165px; height:66px; top:-33px; left:-82.5px; border-width:2.5px; border-color:var(--silver); box-shadow:0 0 6px 1px rgba(184,184,184,.4); transform:rotate(30deg);
      animation:ringPulse2 4.2s ease-in-out 0.8s infinite; }
    .ring-3 { width:124px; height:50px; top:-25px; left:-62px; border-width:2px; border-color:#4169E1; box-shadow:0 0 8px 2px rgba(65,105,225,.5); transform:rotate(-10deg);

    .core-sphere { position:absolute; top:50%; left:50%; width:45px; height:45px; margin:-22.5px 0 0 -22.5px; border-radius:50%; background:radial-gradient(circle at 32% 28%,rgba(65,105,225,.95) 0%,rgba(65,105,225,.48) 42%,rgba(65,105,225,.05) 100%); box-shadow:0 0 18px 6px rgba(65,105,225,.55),0 0 50px 20px rgba(65,105,225,.18); transition:box-shadow .7s ease; z-index:10; }
    .core-sphere.brightened {box-shadow:0 0 28px 12px rgba(65,105,225,.9),0 0 80px 35px rgba(65,105,225,.4);}

    @media(max-height:720px){ .cs-label{margin-bottom:1rem;} #orbitalWrap{width:170px;height:170px;margin-bottom:1.2rem;} .ring-1{width:155px;height:62px;top:-31px;left:-77.5px;} .ring-2{width:128px;height:51px;top:-25.5px;left:-64px;} .ring-3{width:96px;height:39px;top:-19.5px;left:-48px;} .ring-4{width:77px;height:31px;top:-15.5px;left:-38.5px;} .core-sphere{width:35px;height:35px;margin:-17.5px 0 0 -17.5px;} .brand-another{font-size:clamp(1.8rem,4.5vw,2.8rem);} .activate-wrap{margin-bottom:1rem;} }
    @media(max-width:500px){ #orbitalWrap{width:170px;height:170px;margin-bottom:1.4rem;} .ring-1{width:155px;height:62px;top:-31px;left:-77.5px;} .ring-2{width:128px;height:51px;top:-25.5px;left:-64px;} .ring-3{width:96px;height:39px;top:-19.5px;left:-48px;} .ring-4{width:77px;height:31px;top:-15.5px;left:-38.5px;} .core-sphere{width:35px;height:35px;margin:-17.5px 0 0 -17.5px;} .brand-another{font-size:clamp(1.8rem,5vw,2.6rem);} .pillars{font-size:clamp(.72rem,3.5vw,.88rem);} .form-wrap{max-width:100%;} }

<script>
/* ── Star field — passive twinkling background ── */
const canvas=document.getElementById('starCanvas'),ctx=canvas.getContext('2d');
let S=[];
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
function initStars(){S=[];for(let i=0;i<200;i++)S.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.4+0.2,b:Math.random()*0.5+0.1,ph:Math.random()*Math.PI*2,sp:0.4+Math.random()*1.2});}
function drawStars(t){ctx.clearRect(0,0,canvas.width,canvas.height);S.forEach(s=>{const a=s.b+(1-s.b)*0.5*(1+Math.sin(s.ph+t*s.sp*0.001));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.283);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();s.ph+=0.006;});requestAnimationFrame(drawStars);}
resize();initStars();requestAnimationFrame(drawStars);
window.addEventListener('resize',()=>{resize();initStars();});

/* ── Icon Definitions ── */
const ICON_DEFS=[
  {litColor:'#FAFAFA',count:4,svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="1" x2="10" y2="23"/><line x1="14" y1="1" x2="14" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>'},
  {litColor:'#D4AF37',count:4,svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'},
  {litColor:'#B8B8B8',count:3,svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>'},
  {litColor:'#FAFAFA',count:3,svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>'},
  {litColor:'#D4AF37',count:3,svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>'},
  {litColor:'#B8B8B8',count:3,svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>'}
];

/* ── Floating ambient icons ── */
const iconLayer=document.getElementById('iconLayer');
const floatIcons=[];
(function(){
  ICON_DEFS.forEach(def=>{
    for(let i=0;i<def.count;i++){
      const el=document.createElement('div');
      el.className='float-icon';el.innerHTML=def.svg;
      el.style.color=def.litColor;
      const obj={el,x:Math.random()*innerWidth,y:Math.random()*innerHeight,
        vx:((Math.random()-.5)*1.0)||(0.3),vy:((Math.random()-.5)*1.0)||(0.3),
        ph:Math.random()*Math.PI*2,color:def.litColor,warping:false};
      el.style.left=obj.x+'px';el.style.top=obj.y+'px';
      iconLayer.appendChild(el);floatIcons.push(obj);
    }
  });
  function tick(t){
    floatIcons.forEach(ic=>{
      if(!ic.warping){
        ic.x+=ic.vx;ic.y+=ic.vy;
        if(ic.x<-40)ic.x=innerWidth+20;if(ic.x>innerWidth+40)ic.x=-20;
        if(ic.y<-40)ic.y=innerHeight+20;if(ic.y>innerHeight+40)ic.y=-20;
        ic.el.style.left=ic.x+'px';ic.el.style.top=ic.y+'px';
        ic.el.style.opacity=0.07+0.04*Math.sin(ic.ph+t*0.0005);
        ic.el.style.transform='scale(1)';
        ic.el.style.filter='none';
      } else {
        const cx=innerWidth/2,cy=innerHeight/2;
        const dx=ic.x-cx,dy=ic.y-cy;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        const speed=ic.warpSpd*(1+dist/400);
        ic.x+=ic.wvx*speed;ic.y+=ic.wvy*speed;
        const sc=Math.max(0.5,Math.min(2.5,dist/100));
        ic.el.style.transform=`scale(${sc})`;
        ic.el.style.opacity=String(Math.min(0.85,dist/150));
        ic.el.style.left=ic.x+'px';ic.el.style.top=ic.y+'px';
        ic.el.style.filter=`drop-shadow(0 0 ${4*sc}px ${ic.color})`;
        if(ic.x<-80||ic.x>innerWidth+80||ic.y<-80||ic.y>innerHeight+80)resetWarpIcon(ic);
      }
      ic.ph+=0.006;
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

function resetWarpIcon(ic){
  const cx=innerWidth/2,cy=innerHeight/2;
  const angle=Math.random()*Math.PI*2;
  const r=Math.random()*20+5;
  ic.x=cx+Math.cos(angle)*r;ic.y=cy+Math.sin(angle)*r;
  ic.wvx=Math.cos(angle);ic.wvy=Math.sin(angle);
  ic.warpSpd=0.8+Math.random()*1.2;
  ic.el.style.left=ic.x+'px';ic.el.style.top=ic.y+'px';
}
window.addEventListener('resize',()=>floatIcons.forEach(ic=>{
  if(ic.x>innerWidth)ic.x=Math.random()*innerWidth;
  if(ic.y>innerHeight)ic.y=Math.random()*innerHeight;
}));

/* ── Orbital ── */
const movers=['m1','m2','m3','m4'].map(id=>document.getElementById(id));
const coreEl=document.getElementById('coreSphere');
const PATHS=[
  [{tx:'0px',ty:'0px'},{tx:'calc(40vw - 110px)',ty:'calc(-22vh + 36px)'},{tx:'calc(40vw - 110px)',ty:'calc(22vh - 36px)'},{tx:'calc(-40vw + 110px)',ty:'calc(22vh - 36px)'},{tx:'calc(-40vw + 110px)',ty:'calc(-22vh + 36px)'}],
  [{tx:'0px',ty:'0px'},{tx:'calc(-38vw + 95px)',ty:'calc(-20vh + 32px)'},{tx:'calc(-38vw + 95px)',ty:'calc(20vh - 32px)'},{tx:'calc(38vw - 95px)',ty:'calc(20vh - 32px)'},{tx:'calc(38vw - 95px)',ty:'calc(-20vh + 32px)'}],
  [{tx:'0px',ty:'0px'},{tx:'0px',ty:'calc(-20vh + 28px)'},{tx:'calc(35vw - 70px)',ty:'0px'},{tx:'0px',ty:'calc(18vh - 28px)'},{tx:'calc(-35vw + 70px)',ty:'0px'}],
  [{tx:'0px',ty:'0px'},{tx:'0px',ty:'calc(16vh - 23px)'},{tx:'calc(-32vw + 60px)',ty:'0px'},{tx:'0px',ty:'calc(-18vh + 23px)'},{tx:'calc(32vw - 60px)',ty:'0px'}],
];
const ks=document.createElement('style');document.head.appendChild(ks);
function iKF(n,p){const f=p.map((pt,i)=>`${[0,25,50,75,100][i]}%{transform:translate(${pt.tx},${pt.ty});opacity:${i===0?1:0.45};}`).join(' ');try{ks.sheet.insertRule(`@keyframes ${n}{${f}}`,ks.sheet.cssRules.length);}catch(e){}}
function iRK(n,e){try{ks.sheet.insertRule(`@keyframes ${n}{0%{transform:translate(${e.tx},${e.ty});opacity:0.45;}100%{transform:translate(0px,0px);opacity:1;}}`,ks.sheet.cssRules.length);}catch(e){}}
PATHS.forEach((p,i)=>{iKF(`orbit${i+1}`,p);iRK(`ret${i+1}`,p[4]);});
let cyc=false;
function cycle(){
  if(cyc)return;cyc=true;
  setTimeout(()=>movers.forEach((m,i)=>{m.style.transition='none';m.style.animation=`orbit${i+1} 8s linear forwards`;}),5000);
  const rb=13000;
  [3,2,1,0].forEach((mi,step)=>setTimeout(()=>{movers[mi].style.animation=`ret${mi+1} 1800ms cubic-bezier(0.25,0.1,0.25,1) forwards`;if(mi===2)coreEl.classList.add('brightened');},rb+step*600));
  setTimeout(()=>{movers.forEach(m=>{m.style.animation='none';m.style.transition='opacity .5s';m.style.opacity='1';m.style.transform='translate(0px,0px)';});coreEl.classList.remove('brightened');cyc=false;setTimeout(cycle,3000);},rb+3*600+400+200);
}
setTimeout(cycle,2000);

/* ── Activate — icons fly toward user ── */
let activated=false;
function activateWarp(){
  if(activated)return;activated=true;
  ['ripple1','ripple2','ripple3'].forEach((id,i)=>setTimeout(()=>{
    const r=document.getElementById(id);r.classList.remove('active');void r.offsetWidth;r.classList.add('active');
  },i*200));
  const btn=document.getElementById('activateBtn');
  btn.disabled=true;btn.classList.add('warping');
  btn.textContent='Activated ✦';
  document.getElementById('coreSphere').classList.add('brightened');
  floatIcons.forEach((ic,idx)=>setTimeout(()=>{ic.warping=true;resetWarpIcon(ic);},idx*40));
  setTimeout(()=>{
    floatIcons.forEach(ic=>{ic.warping=false;ic.el.style.transform='scale(1)';ic.el.style.filter='none';ic.el.style.opacity='0.07';});
    document.getElementById('coreSphere').classList.remove('brightened');
    setTimeout(()=>{btn.textContent='Activate';btn.classList.remove('warping');btn.disabled=false;activated=false;},500);
  },7000);
}

/* ── Email ── */
const SU='https://script.google.com/macros/s/AKfycbxr-7JSECtFFEY84AIi31Vib3TxdUT71N8-fBeJmYCdAXozSxri-r_LFJvJ4p_dvA3eZw/exec';
async function submitEmail(){
  const inp=document.getElementById('emailInput'),btn=inp.nextElementSibling,email=inp.value.trim();
  const emailRe=/^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;
  if(!email||!emailRe.test(email)){showErr('Please enter a valid email (e.g. name@domain.com)');return;}
  const orig=btn.textContent;btn.textContent='...';btn.disabled=true;let ok=false;
  if(SU){try{const url=SU+'?email='+encodeURIComponent(email)+'&venture='+encodeURIComponent('Another Realm Ventures')+'&source='+encodeURIComponent(location.hostname);await fetch(url,{mode:'no-cors'});ok=true;}catch(_){}}
  if(!ok){try{const fd=new FormData();fd.append('form-name','ventures-waitlist');fd.append('venture','Another Realm Ventures');fd.append('email',email);const r=await fetch('/',{method:'POST',body:fd});if(r.ok)ok=true;}catch(_){ok=true;}}
  if(ok){document.getElementById('inputRow').style.display='none';document.getElementById('successMsg').style.display='block';}
  else{btn.textContent=orig;btn.disabled=false;showErr('Something went wrong. Try again.');}
}
function showErr(m){const e=document.getElementById('errorMsg');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}
document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitEmail();});
</script>
